# 💜 Leavn      = #241c30 (deep lavender)
# 🌊 HubDash    = #141f29 (deep teal)
# ⚡ SigStack   = #1f1a14 (warm amber)
# 🌙 Overnight  = #140f1f (deep violet)
# 🎬 Media      = #24141a (rose burgundy)
# 🧪 Scripts    = #0f1f14 (matrix green)
# 💰 Tip        = #1a1f0f (money lime)
# 🎙️ Modcaster  = #291424 (podcast magenta)
# 🤖 Claude     = #1f170f (terracotta)
# 🔄 n8n        = #1c140f (workflow brown)
# 🧠 BRAIN      = #141c23 (neural blue)
# 🚀 Contacts   = #121c29 (navy)
#
# Accent colors (bright, for text/highlights)
# Primary      = #e08151 (terracotta accent)
# Success      = #8cb369 (growth green)
# Warning      = #d4a93a (amber)
# Error        = #cc6666 (muted red)
# Info         = #7aa2c9 (soft blue)
# Structure    = #9d8ec2 (lavender)
